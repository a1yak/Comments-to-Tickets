<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>PulseDesk</title>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #f5f7fa, #e4ecf7);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 560px;
      padding: 24px;
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo h1 {
      font-size: 28px;
      font-weight: 700;
      color: #2d3748;
      letter-spacing: -0.5px;
    }

    .logo p {
      color: #718096;
      font-size: 14px;
      margin-top: 6px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.07);
    }

    .card h2 {
      font-size: 17px;
      font-weight: 600;
      color: #2d3748;
      margin-bottom: 16px;
    }

    textarea {
      width: 100%;
      border-radius: 10px;
      border: 1.5px solid #e2e8f0;
      padding: 14px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      color: #2d3748;
      transition: border-color 0.2s;
      line-height: 1.6;
    }

    textarea:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.08);
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }

    .btn-primary {
      flex: 1;
      padding: 11px 20px;
      border-radius: 10px;
      border: none;
      background-color: #4f46e5;
      color: white;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-primary:hover {
      background-color: #4338ca;
    }

    .btn-secondary {
      padding: 11px 20px;
      border-radius: 10px;
      border: 1.5px solid #e2e8f0;
      background: white;
      color: #4f46e5;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: border-color 0.2s, background 0.2s;
      white-space: nowrap;
    }

    .btn-secondary:hover {
      border-color: #4f46e5;
      background: #f5f3ff;
    }

    .success-banner {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 20px;
      color: #15803d;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
  </style>
</head>
<body>

<div class="container">

  <div class="logo">
    <h1>PulseDesk</h1>
    <p>Submit a comment — we'll handle the rest</p>
  </div>

  <div class="card">

    <div th:if="${submitted}" class="success-banner">
      ✅ Comment received and analyzed. A ticket may have been created.
    </div>

    <h2>Leave a Comment</h2>

    <form th:action="@{/comments}" method="post" th:object="${newComment}">
      <textarea
              th:field="*{commentText}"
              rows="5"
              placeholder="Describe your issue, request, or feedback...">
      </textarea>

      <div class="actions">
        <button type="submit" class="btn-primary">Submit Comment</button>
        <a href="/tickets" class="btn-secondary">🎫 Show Tickets</a>
      </div>
    </form>

  </div>

</div>

</body>
</html>
