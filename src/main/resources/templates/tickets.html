<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>PulseDesk - Tickets</title>
    <meta charset="UTF-8">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: linear-gradient(135deg, #f5f7fa, #e4ecf7); min-height: 100vh; padding: 40px 24px; }
        .container { max-width: 800px; margin: 0 auto; }
        .header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 32px; }
        .header h1 { font-size: 24px; font-weight: 700; color: #2d3748; }
        .header p { color: #718096; font-size: 14px; margin-top: 4px; }
        .btn-back { padding: 10px 18px; border-radius: 10px; border: 1.5px solid #e2e8f0; background: white; color: #4f46e5; font-size: 14px; font-weight: 500; text-decoration: none; display: inline-flex; align-items: center; transition: border-color 0.2s, background 0.2s; }
        .btn-back:hover { border-color: #4f46e5; background: #f5f3ff; }
        .empty { background: white; border-radius: 16px; padding: 60px 30px; text-align: center; color: #718096; box-shadow: 0 8px 30px rgba(0,0,0,0.07); }
        .ticket-card { background: white; border-radius: 14px; padding: 22px 24px; margin-bottom: 16px; box-shadow: 0 4px 16px rgba(0,0,0,0.06); display: flex; gap: 20px; align-items: flex-start; transition: transform 0.15s ease; }
        .ticket-card:hover { transform: translateY(-2px); }
        .ticket-id { font-size: 11px; font-weight: 600; color: #a0aec0; background: #f7fafc; border-radius: 6px; padding: 4px 8px; white-space: nowrap; border: 1px solid #e2e8f0; }
        .ticket-body { flex: 1; }
        .ticket-title { font-size: 16px; font-weight: 600; color: #2d3748; margin-bottom: 6px; }
        .ticket-summary { font-size: 13px; color: #718096; line-height: 1.5; margin-bottom: 14px; }
        .ticket-meta { display: flex; gap: 8px; }
        .badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; text-transform: uppercase; }
        .cat-bug { background: #fff0f0; color: #c53030; }
        .cat-feature { background: #ebf8ff; color: #2b6cb0; }
        .cat-billing { background: #fffff0; color: #b7791f; }
        .cat-account { background: #f0fff4; color: #276749; }
        .cat-other { background: #faf5ff; color: #6b46c1; }
        .pri-high { background: #fff5f5; color: #e53e3e; }
        .pri-medium { background: #fffaf0; color: #dd6b20; }
        .pri-low { background: #f0fff4; color: #38a169; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div>
            <h1>Support Tickets</h1>
            <p th:text="${tickets.size()} + ' ticket(s) generated by AI analysis'"></p>
        </div>
        <a href="/" class="btn-back">← Back</a>
    </div>
    <div th:if="${#lists.isEmpty(tickets)}" class="empty">
        No tickets yet. Submit a comment describing an issue to generate one.
    </div>
    <div th:each="ticket : ${tickets}" class="ticket-card">
        <span class="ticket-id" th:text="'#' + ${ticket.id}"></span>
        <div class="ticket-body">
            <div class="ticket-title" th:text="${ticket.title}"></div>
            <div class="ticket-summary" th:text="${ticket.summary}"></div>
            <div class="ticket-meta">
                <span class="badge" th:classappend="'cat-' + ${ticket.category}" th:text="${ticket.category}"></span>
                <span class="badge" th:classappend="'pri-' + ${ticket.priority}" th:text="${ticket.priority}"></span>
            </div>
        </div>
    </div>
</div>
</body>
</html>
